<!DOCTYPE html>
<html lang="ja" style="font-size: 2.5vmin">
  <head>
    <meta charset="utf-8">
    <title>til tools</title>
    <link rel="icon" href="./favicon.svg">
    <link rel="shortcut icon" href="./favicon.svg">
    <style>
      :root {
        --menu: 10rem;
      }
      html {
        height: 100%;
      }
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        display: grid;
        gap: 0.2rem;
        grid-template-columns: var(--menu) calc(100% - var(--menu) - 0.2rem);
      }
      menu {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
      }
      h3 {
        margin: 0;
        text-align: center;
      }
      button {
        display: block;
        width: 100%;
        cursor: pointer;
      }
    </style>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const main = document.querySelector("main");
        const components = {};
        [...document.querySelectorAll("button[data-component]")]
          .forEach((button) => {
            button.addEventListener("click", () => {
              const componentName = button.dataset.component;
              if (!components[componentName]) {
                const script = document.createElement("script");
                script.src = `./${componentName}.js`;
                document.head.appendChild(script);
                components[componentName] = script;
              }
              main.innerHTML = `<${componentName}></${componentName}>`;
            });
          });
      });
    </script>
  </head>
  <body>
    <menu>
      <li><h3>Tools</h3></li>
      <li><button data-component="jwt-key">Generate JWT key</button></li>
    </menu>
    <main></main>
  </body>
</html>
